name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: worker/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: worker

      - name: Generate wrangler.toml
        working-directory: worker
        env:
          WRANGLER_TOML_CONTENT: ${{ secrets.WRANGLER_TOML }}
        run: printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml

      - name: Typecheck Worker
        working-directory: worker
        run: pnpm exec tsc --noEmit

      - name: Remove legacy API key secret
        working-directory: worker
        run: pnpm wrangler secret delete CATTOPIC_API_KEY --name cattopic-worker || true

      - name: Deploy to Cloudflare
        working-directory: worker
        run: |
          pnpm wrangler deploy
          echo "✅ Deploy completed"
